name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine release notes
        id: notes
        run: |
          if [ -f RELEASE-NOTES.md ]; then
            echo "file=RELEASE-NOTES.md" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          --title "Release ${{ github.ref_name }}"
          ${{ steps.notes.outputs.file != '' &&
              format('--notes-file {0}', steps.notes.outputs.file) ||
              format('--notes "Release {0}"', github.ref_name) }}
